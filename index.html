<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV CRM · Gestão Comercial</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/modals.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script type="module" src="js/app.js"></script>
</head>
<body>
    <div id="globalLoader"><div class="loader-fill"></div></div>
    <div id="toast-container"></div>

    <button class="hamburger" id="hamburgerBtn" aria-label="Abrir menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
    </button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <div class="login-icon">CV</div>
            <h2>CV CRM</h2>
            <p class="subtitle">Acesso ao Sistema</p>
            <div class="login-form">
                <div class="segment-control" id="perfilSegment">
                    <button type="button" class="segment-btn" data-perfil="Vendedor">Vendedor</button>
                    <button type="button" class="segment-btn" data-perfil="Gerente">Gerente</button>
                    <button type="button" class="segment-btn" data-perfil="Administrador">Admin</button>
                </div>
                <div class="user-select-wrapper" id="usuarioSelectWrapper">
                    <select id="loginUsuarioSelect">
                        <option value="">Selecione seu nome...</option>
                    </select>
                </div>
            </div>
            <button class="login-btn" id="btnLogin">Entrar no Sistema</button>
            <div class="login-msg" id="loginMsg"></div>
        </div>
    </div>

    <aside class="sidebar" id="sidebar" style="display:none;">
        <div class="sidebar-greeting"><div class="greeting-text" id="sidebarGreeting"></div><div class="greeting-sub" id="sidebarSub"></div></div>
        <nav class="sidebar-nav">
            <button class="nav-item" data-nav="admin_inicio" id="navAdmin" style="display:none;">Administração</button>
            <button class="nav-item active" data-nav="inicio">Início</button>
            <button class="nav-item" data-nav="agenda_dia">Agenda do Dia</button>
            <button class="nav-item" data-nav="clientes_lista">Clientes</button>
            <button class="nav-item" data-nav="metas" id="navMetas" style="display:none;">Metas</button>
        </nav>
        <div class="sidebar-footer"><div class="avatar-small" id="sidebarAvatar"></div><div class="user-info"><strong id="sidebarNome"></strong><span id="sidebarPerfil"></span></div></div>
        <div class="sidebar-actions"><button class="theme-toggle" id="themeToggle">Alternar tema</button><button class="btn-logout-sidebar" data-action="logout">Sair do sistema</button></div>
    </aside>

    <main class="main-content" id="mainContent" style="display:none;"></main>
    <button class="fab" id="fabButton" style="display:none;" data-action="novo-orcamento">+</button>

    <!-- Modais globais (idênticos ao original, mas mantidos aqui) -->
    <div class="modal-overlay" id="modalMotivoPerda" onclick="if(event.target===this)window.closeModal('modalMotivoPerda')">
        <div class="modal-card"><h3>Motivo da Perda</h3><label>Selecione o motivo principal *</label><select id="motivoPerdaSelect"><option value="">Selecione...</option><option value="Achou caro">Achou caro</option><option value="Comprou no concorrente">Comprou no concorrente</option><option value="Desistiu da compra">Desistiu da compra</option><option value="Falta de limite/crédito">Falta de limite/crédito</option><option value="Outros">Outros</option></select><label>Detalhes adicionais</label><textarea id="motivoPerda" rows="3"></textarea><div class="field-error" id="errMotivo"></div><div class="modal-btns"><button class="btn-cancelar-modal" onclick="window.closeModal('modalMotivoPerda')">Cancelar</button><button class="btn-salvar-modal" id="btnConfirmarPerda">Confirmar Perda</button></div></div>
    </div>
    <div class="modal-overlay" id="modalConfirmaFechamento" onclick="if(event.target===this)window.closeModal('modalConfirmaFechamento')">
        <div class="modal-card"><h3>Confirmar Fechamento de Venda</h3><p style="margin-bottom:20px;">Preencha os detalhes finais.</p><label>Forma de Pagamento *</label><select id="fechamentoFormaPagamento"><option value="">Selecione...</option><optgroup label="A Vista"><option>Dinheiro</option><option>PIX</option><option>Cartao de Debito</option></optgroup><optgroup label="A Prazo"><option>Cartao de Credito 1x</option><option>Cartao de Credito 2x</option><option>Cartao de Credito 3x</option><option>Cartao de Credito 4x</option><option>Cartao de Credito 5x</option><option>Cartao de Credito 6x</option><option>Cartao de Credito 7x a 12x</option><option>Boleto Bancario</option><option>Crediario Proprio</option><option>Financiamento</option></optgroup></select><div class="field-error" id="errFormaPagamento"></div><label>Data de Entrega *</label><input type="date" id="fechamentoDataEntrega"><div class="field-error" id="errDataEntrega"></div><div class="modal-btns"><button class="btn-cancelar-modal" onclick="window.closeModal('modalConfirmaFechamento')">Cancelar</button><button class="btn-salvar-modal" id="btnConfirmaFechar">Confirmar Fechamento</button></div></div>
    </div>
    <div class="modal-overlay" id="modalEditarMeta" onclick="if(event.target===this)window.closeModal('modalEditarMeta')"><div class="modal-card"><h3>Editar Meta</h3><label>Nova meta (R$)</label><input type="text" id="inputMetaValor"><div class="field-error" id="errMeta"></div><div class="modal-btns"><button class="btn-cancelar-modal" onclick="window.closeModal('modalEditarMeta')">Cancelar</button><button class="btn-salvar-modal" id="btnSalvarMeta">Salvar</button></div></div></div>
    <div class="modal-overlay" id="modalExcluirComentario" onclick="if(event.target===this)window.closeModal('modalExcluirComentario')"><div class="modal-card"><h3>Excluir comentário</h3><p>Tem certeza?</p><div class="modal-btns"><button class="btn-cancelar-modal" onclick="window.closeModal('modalExcluirComentario')">Cancelar</button><button class="btn-salvar-modal" id="btnConfirmarExclusao" style="background:#ef4444;">Excluir</button></div></div></div>
    <div class="modal-overlay" id="modalUsuarioAdmin" onclick="if(event.target===this)window.closeModal('modalUsuarioAdmin')"><div class="modal-card"><h3 id="modalUsuarioTitle">Novo Usuário</h3><label>Nome</label><input id="adminModNome"><label>E-mail</label><input id="adminModEmail"><label>Loja</label><select id="adminModLoja"></select><div class="modal-row"><div><label>Perfil</label><select id="adminModPerfil"><option>Vendedor</option><option>Gerente</option><option>Administrador</option></select></div><div><label>Status</label><select id="adminModStatus"><option>Ativo</option><option>Inativo</option></select></div></div><label>Senha</label><input type="password" id="adminModSenha"><div class="field-error" id="errAdminUsuario"></div><div class="modal-btns"><button class="btn-cancelar-modal" onclick="window.closeModal('modalUsuarioAdmin')">Cancelar</button><button class="btn-salvar-modal" id="btnSalvarUsuarioAdmin">Salvar</button></div></div></div>
    <div class="modal-overlay" id="modalExcluirUsuarioAdmin" onclick="if(event.target===this)window.closeModal('modalExcluirUsuarioAdmin')"><div class="modal-card"><h3>Excluir Usuário</h3><p>Deseja excluir <strong id="nomeUsuarioExcluir"></strong>?</p><div class="modal-btns"><button class="btn-cancelar-modal" onclick="window.closeModal('modalExcluirUsuarioAdmin')">Cancelar</button><button class="btn-salvar-modal" id="btnConfirmarExclusaoUsuario" style="background:#ef4444;">Excluir</button></div></div></div>
    <div class="modal-overlay" id="modalEditarCliente" onclick="if(event.target===this)window.closeModal('modalEditarCliente')"><div class="modal-card"><h3>Editar Cliente</h3><input type="hidden" id="editClienteId"><label>Nome</label><input id="editClienteNome"><div class="field-error" id="errEditNome"></div><div class="modal-row"><div><label>CPF</label><input id="editClienteCpf"><div class="field-error" id="errEditCpf"></div></div><div><label>WhatsApp</label><input id="editClienteTel"><div class="field-error" id="errEditTel"></div></div></div><label>E-mail</label><input id="editClienteEmail"><div class="modal-btns"><button class="btn-cancelar-modal" onclick="window.closeModal('modalEditarCliente')">Cancelar</button><button class="btn-salvar-modal" id="btnSalvarEditCliente">Salvar</button></div></div></div>
    <div class="modal-overlay" id="modalExcluirCliente" onclick="if(event.target===this)window.closeModal('modalExcluirCliente')"><div class="modal-card"><h3>Excluir Cliente</h3><p>Excluir <strong id="nomeClienteExcluir"></strong>?</p><div class="modal-btns"><button class="btn-cancelar-modal" onclick="window.closeModal('modalExcluirCliente')">Cancelar</button><button class="btn-salvar-modal" id="btnConfirmarExcluirCliente" style="background:#ef4444;">Excluir</button></div></div></div>
    <div class="modal-overlay" id="modalCriarNegocio" onclick="if(event.target===this)window.closeModal('modalCriarNegocio')"><div class="modal-card"><h3>Criar Negócio</h3><p>Iniciar orçamento para <strong id="nomeClienteNegocio"></strong>?</p><div class="modal-btns"><button class="btn-cancelar-modal" onclick="window.closeModal('modalCriarNegocio')">Cancelar</button><button class="btn-salvar-modal" id="btnIrNovoOrcamento">Ir para Novo Orçamento</button></div></div></div>

    <div class="notification-dropdown" id="notificationDropdown"></div>
</body>
</html>
