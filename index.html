<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV CRM · Gestão Comercial</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
</head>
<body>
    <div id="globalLoader"><div class="loader-fill"></div></div>
    <div id="toast-container"></div>

    <button class="hamburger" id="hamburgerBtn" aria-label="Abrir menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
    </button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <div class="login-icon" aria-hidden="true">CV</div>
            <h2>CV CRM</h2>
            <p class="subtitle">Acesso ao Sistema</p>
            <div class="login-form">
                <div class="segment-control" id="perfilSegment">
                    <button type="button" class="segment-btn" onclick="selecionarPerfil('Vendedor', this)">Vendedor</button>
                    <button type="button" class="segment-btn" onclick="selecionarPerfil('Gerente', this)">Gerente</button>
                    <button type="button" class="segment-btn" onclick="selecionarPerfil('Administrador', this)">Admin</button>
                </div>
                <div class="user-select-wrapper" id="usuarioSelectWrapper">
                    <select id="loginUsuarioSelect">
                        <option value="">Selecione seu nome...</option>
                    </select>
                </div>
            </div>
            <button class="login-btn" id="btnLogin" onclick="handleLogin()">
                <span class="spinner"></span>
                <span class="btn-text">Entrar no Sistema</span>
            </button>
            <div class="login-msg" id="loginMsg" role="alert"></div>
        </div>
    </div>

    <aside class="sidebar" id="sidebar" style="display:none;" role="navigation" aria-label="Menu principal">
        <div class="sidebar-greeting"><div class="greeting-text" id="sidebarGreeting">Bom dia!</div><div class="greeting-sub" id="sidebarSub">Sua meta está próxima!</div></div>
        <nav class="sidebar-nav">
            <button class="nav-item" data-nav="admin_inicio" id="navAdmin" style="display:none;" onclick="navigateTo('admin_inicio')">Administração</button>
            <button class="nav-item active" data-nav="inicio" id="navInicioVendas" onclick="navigateTo('inicio')" aria-current="page"><span id="textNavInicio">Início</span></button>
            <button class="nav-item" data-nav="agenda_dia" onclick="navigateTo('agenda_dia')">Agenda do Dia</button>
            <button class="nav-item" data-nav="clientes_lista" onclick="navigateTo('clientes_lista')">Clientes</button>
            <button class="nav-item" data-nav="metas" id="navMetas" style="display:none;" onclick="navigateTo('metas')">Metas</button>
        </nav>
        <div class="sidebar-footer"><div class="avatar-small" id="sidebarAvatar">C</div><div class="user-info"><strong id="sidebarNome">Usuário</strong><span id="sidebarPerfil">Perfil</span></div></div>
        <div class="sidebar-actions"><button class="theme-toggle" onclick="toggleTheme()">Alternar tema</button><button class="btn-logout-sidebar" onclick="logout()">Sair do sistema</button></div>
    </aside>

    <main class="main-content" id="mainContent" style="display:none;"></main>
    <button class="fab" id="fabButton" style="display:none;" onclick="abrirNovoOrcamento()" aria-label="Novo orçamento" title="Novo orçamento">+</button>

    <div class="modal-overlay" id="modalMotivoPerda" onclick="if(event.target === this) closeModal('modalMotivoPerda')">
        </div>
    
    <div class="modal-overlay" id="modalConfirmaFechamento" onclick="if(event.target === this) closeModal('modalConfirmaFechamento')">
        </div>
    
    <div class="modal-overlay" id="modalEditarMeta" onclick="if(event.target === this) closeModal('modalEditarMeta')">
        </div>

    <div class="modal-overlay" id="modalUsuarioAdmin" onclick="if(event.target === this) closeModal('modalUsuarioAdmin')">
        </div>

    <div class="notification-dropdown" id="notificationDropdown"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/charts.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
